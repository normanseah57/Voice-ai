<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — VoiceDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at top, rgba(6,182,212,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at bottom, rgba(139,92,246,0.06) 0%, transparent 60%);
    }
    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(139,92,246,0.15));
      padding: 32px 32px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #06b6d4, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .icon-wrap svg { width: 30px; height: 30px; stroke: #06b6d4; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: 6px; }
    p.subtitle { font-size: 0.85rem; color: #94a3b8; }
    .card-body { padding: 32px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #06b6d4; }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      color: white;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .message.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .message.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #64748b; font-size: 0.82rem; text-decoration: none; }
    .back-link:hover { color: #06b6d4; }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: rgba(255,255,255,0.05); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0%; }
    .strength-label { font-size: 0.72rem; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">VoiceDesk</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Set New Password</h1>
      <p class="subtitle">Choose a strong password for your account</p>
    </div>
    <div class="card-body">
      <div id="msg-success" class="message success">✓ Password updated successfully! Redirecting to login...</div>
      <div id="msg-error" class="message error">Something went wrong. Please try again.</div>

      <form id="reset-form">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="submit-btn">Update Password</button>
      </form>
      <a href="/" class="back-link">← Back to VoiceDesk</a>
    </div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('msg-error').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('msg-error').style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
    }

    // Password strength
    document.getElementById('new-password').addEventListener('input', function() {
      const pw = this.value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      fill.style.width = (score * 25) + '%';
      fill.style.background = colors[score - 1] || 'transparent';
      label.textContent = score > 0 ? labels[score - 1] : '';
      label.style.color = colors[score - 1] || '#64748b';
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('msg-error');
      const okEl = document.getElementById('msg-success');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (newPassword !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if (newPassword.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          okEl.style.display = 'block';
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 2500);
        } else {
          errEl.textContent = data.error || 'Failed to reset password.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Update Password';
        }
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
